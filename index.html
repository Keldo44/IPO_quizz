<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz IPO Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0078d4;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass: rgba(255, 255, 255, 0.7);
            --fluent-curve: cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* Contenedor con efecto Glassmorphism */
        #quiz-container {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 10;
        }

        /* Barra de progreso elegante */
        .progress-container {
            height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin-bottom: 30px;
        }
        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 10px;
            transition: width 0.8s var(--fluent-curve);
            box-shadow: 0 0 15px rgba(0, 120, 212, 0.3);
        }

        /* Estilo de la pregunta */
        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a1b;
            line-height: 1.4;
            margin-bottom: 30px;
            min-height: 90px;
        }

        /* Botones estilo Neumorphism/Fluent */
        .options { display: flex; gap: 15px; }

        button {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            background: #ffffff;
            color: #444;
            transition: all 0.3s var(--fluent-curve);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02), inset 0 0 0 1px rgba(0,0,0,0.05);
        }

        button:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            background: #fff;
            color: var(--primary);
        }

        button:active:not(:disabled) { transform: scale(0.96); }

        /* Estados de respuesta */
        .btn-correct { 
            background: var(--success) !important; 
            color: white !important;
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4) !important;
        }

        .btn-wrong { 
            background: var(--error) !important; 
            color: white !important;
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4) !important;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        /* Animación de entrada de pregunta */
        .fade-up {
            animation: fadeUp 0.6s var(--fluent-curve);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Feedback de fondo */
        body.correct-flash { background: #d4edda; }
        body.wrong-flash { background: #f8d7da; }

        .hidden { display: none !important; }

        /* Rejilla de resultados */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 25px 0;
        }

        .grid-item {
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
        }
    </style>
</head>
<body id="body-bg">

<div id="quiz-container">
    <div id="quiz-header">
        <div class="progress-container"><div id="progress-fill"></div></div>
        <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
            <span id="counter" style="font-weight: 700; color: var(--primary); font-size: 0.8rem; letter-spacing: 1px;">PREGUNTA 1/20</span>
        </div>
    </div>

    <div id="content-area" class="fade-up">
        <h2 id="question-text">Carregant pregunta...</h2>
        <div class="options">
            <button id="btn-true" onclick="handleAnswer(true)">CERT</button>
            <button id="btn-false" onclick="handleAnswer(false)">FALS</button>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <h1 style="margin: 0 0 10px 0;">Completat!</h1>
        <p id="final-stats" style="font-size: 1.1rem; color: #555;"></p>
        <div class="results-grid" id="feedback-grid"></div>
        <button onclick="location.reload()" style="width:100%; background: var(--primary); color: white;">Tornar a començar</button>
    </div>
</div>

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let userResults = [];
    let lock = false;

    function init() {
        // 1. Mezclamos el array completo de forma aleatoria
        // 2. Usamos .slice(0, 20) para quedarnos solo con las primeras 20 del resultado mezclado
        currentQuestions = [...allQuestions]
            .sort(() => 0.5 - Math.random())
            .slice(0, 20);

        // Reiniciamos el índice por si acaso se llama a init() más de una vez
        currentIndex = 0;
        userResults = [];
        
        renderQuestion();
    }

    function renderQuestion() {
        lock = false;
        const qData = currentQuestions[currentIndex];
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('counter').innerText = `PREGUNTA ${currentIndex + 1}/${currentQuestions.length}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / currentQuestions.length) * 100}%`;
        
        // Reset botones
        document.getElementById('btn-true').className = '';
        document.getElementById('btn-false').className = '';
        document.getElementById('content-area').classList.remove('fade-up');
        void document.getElementById('content-area').offsetWidth; // Trigger reflow
        document.getElementById('content-area').classList.add('fade-up');
    }

    function handleAnswer(ans) {
        if (lock) return;
        lock = true;

        const qData = currentQuestions[currentIndex];
        const isCorrect = ans === qData.a;
        const btnClicked = document.getElementById(ans ? 'btn-true' : 'btn-false');
        const body = document.getElementById('body-bg');

        userResults.push({ id: qData.id, correct: isCorrect });

        if (isCorrect) {
            btnClicked.classList.add('btn-correct');
            body.classList.add('correct-flash');
            setTimeout(() => {
                body.classList.remove('correct-flash');
                next();
            }, 500); // Rápido si aciertas
        } else {
            btnClicked.classList.add('btn-wrong');
            document.getElementById(qData.a ? 'btn-true' : 'btn-false').classList.add('btn-correct');
            body.classList.add('wrong-flash');
            setTimeout(() => {
                body.classList.remove('wrong-flash');
                next();
            }, 2000); // Penalización de 2s
        }
    }

    function next() {
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            renderQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('content-area').classList.add('hidden');
        document.getElementById('quiz-header').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        
        const corrects = userResults.filter(r => r.correct).length;
        document.getElementById('final-stats').innerHTML = `Has encertat <strong>${corrects}</strong> preguntes.`;
        
        const grid = document.getElementById('feedback-grid');
        userResults.forEach(r => {
            const div = document.createElement('div');
            div.className = `grid-item ${r.correct ? 'btn-correct' : 'btn-wrong'}`;
            div.innerText = r.id;
            grid.appendChild(div);
        });
    }

    init();
</script>
</body>
</html>
